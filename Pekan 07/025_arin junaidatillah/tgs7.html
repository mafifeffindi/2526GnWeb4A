DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Modern</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        header {
            background: rgba(0,0,0,0.6);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        header h1 {
            font-size: 32px;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            padding: 15px 20px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #3498db;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in;
        }

        h2 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            margin-bottom: 15px;
            line-height: 1.6;
        }

        ul {
            margin-left: 20px;
        }

        li {
            margin-bottom: 8px;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: white;
            background: rgba(0,0,0,0.6);
            margin-top: 30px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<header>
    <h1>Website Modern</h1>
    <p>Belajar HTML & CSS Lebih Keren</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Profil</a>
    <a href="#">Kontak</a>
</nav>

<div class="container">
    <h2>Selamat Datang 👋</h2>
    <p>

    </p>

    <h3>Yang Dipelajari</h3>
    <ul>
        <li>Struktur HTML</li>
        <li>CSS Modern</li>
        <li>Layout rapi</li>
        <li>Animasi sederhana</li>
    </ul>
</div>

<footer>
    <p>© 2026 - Website Modern</p>
</footer>

</body>
</html>
