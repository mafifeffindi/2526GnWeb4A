<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Sederhana Punya Nurani Anisa Putri</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #4989ea;
        }

        header {
            background-color: #2c3e50;
            color: rgb(241, 172, 252);
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #027ffd;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: rgb(250, 250, 189);
        }

        .container {
            padding: 20px;
            background-color: white;
            margin: 20px;
            border-radius: 8px;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        /* Garis luar tambahan di luar border */
        .outline {
        border: 2px solid rgb(151, 206, 248);
        outline: 3px dashed rgb(243, 178, 250);
        }
        /* Kombinasi content, padding, border, margin */
        .box {
        width: 300px;
        padding: 50px;
        border: 15px solid rgb(157, 225, 247);
        margin: 20px;
        background-color: rgb(254, 253, 253);
}
    </style>

</head>
